var s={sub:0,u:0,p:0};
var A={};
var L=["A","B","C"];

function key(si,ui,pi,qi){return SUBS[si].id+"-"+ui+"-"+pi+"-"+qi;}
function curSub(){return SUBS[s.sub];}
function curUnit(){return curSub().units[s.u];}
function curPage(){return curUnit().pages[s.p];}
function getScore(){var c=0;Object.keys(A).forEach(function(k){if(A[k]&&A[k].ok)c++;});return c;}
function getTot(){var t=0;Object.keys(A).forEach(function(){t++;});return t;}

function goSub(i){s.sub=i;s.u=0;s.p=0;render();}
function goUnit(i){s.u=i;s.p=0;render();}
function goNext(){var pg=curUnit().pages;if(s.p<pg.length-1){s.p++;render();}}
function goPrev(){if(s.p>0){s.p--;render();}}

function choose(qi,oi){
  var k=key(s.sub,s.u,s.p,qi);
  if(A[k])return;
  var q=curPage().qs[qi];
  A[k]={chosen:oi,ok:oi===q.ans};
  render();
}

function render(){
  var sub=curSub();
  var unit=curUnit();
  var page=curPage();
  var totalP=unit.pages.length;
  var isCN=unit.lang==="cn";

  // Subject bar
  var sh="";
  SUBS.forEach(function(sb,i){
    sh+='<button class="sbtn'+(i===s.sub?" on "+sb.cls:"")+'" onclick="goSub('+i+')">'+sb.lbl+"</button>";
  });
  document.getElementById("sbar").innerHTML=sh;

  // Unit bar
  var units=sub.units;
  var uh="";
  units.forEach(function(u,i){
    uh+='<button class="ubtn'+(i===s.u?" on":"")+'" onclick="goUnit('+i+')">'+u.em+" "+u.lbl+"</button>";
  });
  document.getElementById("ubar").innerHTML=uh;

  // Content
  var h="";
  h+='<div class="topbar">';
  h+='<span class="ulbl">'+unit.title+' &middot; '+(isCN?"第":"Page ")+(s.p+1)+(isCN?" / ":"/")+totalP+(isCN?"页":"")+'</span>';
  h+='<span class="stag">⭐ '+getScore()+(isCN?" 对":" correct")+"</span>";
  h+="</div>";
  h+='<div class="ph"><p class="ph-t">'+page.title+'</p><p class="ph-s">'+page.sub+"</p></div>";
  if(page.passage){
    h+='<div class="passage">'+page.passage.replace(/\n/g,"<br>")+"</div>";
  }
  for(var qi=0;qi<page.qs.length;qi++){
    var q=page.qs[qi];
    var k=key(s.sub,s.u,s.p,qi);
    var a=A[k];
    h+='<div class="qcard">';
    if(q.img)h+='<span class="qi">'+q.img+"</span>";
    h+='<p class="qt">'+(qi+1)+". "+q.q+"</p><div class=\"opts\">";
    for(var oi=0;oi<q.opts.length;oi++){
      var cls="opt";
      if(a){if(oi===q.ans)cls+=" good";else if(oi===a.chosen&&oi!==q.ans)cls+=" bad";}
      h+='<button class="'+cls+'" onclick="choose('+qi+','+oi+')" '+(a?"disabled":"")+">"+L[oi]+". "+q.opts[oi]+"</button>";
    }
    h+="</div>";
    if(a){
      var correct=q.opts[q.ans];
      var msg=isCN
        ?(a.ok?"✅ 答对了！答案：<strong>"+correct+"</strong>":"❌ 正确答案：<strong>"+correct+"</strong>")
        :(a.ok?"✅ Correct! Answer: <strong>"+correct+"</strong>":"❌ Correct answer: <strong>"+correct+"</strong>");
      h+='<p class="fb '+(a.ok?"ok":"no")+'">'+msg+"</p>";
      h+='<div class="wa"><p class="wa-lbl">✏️ '+q.wp+'</p><input class="wa-in" type="text" placeholder="'+correct+'..."></div>';
    }
    h+="</div>";
  }
  var dots="";
  for(var i=0;i<totalP;i++)dots+='<div class="dot'+(i===s.p?" on":"")+'"></div>';
  h+='<div class="pnav">';
  h+='<button class="nbtn" onclick="goPrev()" '+(s.p===0?"disabled":"")+">← "+(isCN?"上一页":"Back")+"</button>";
  h+='<div class="pdots">'+dots+"</div>";
  h+='<button class="nbtn" onclick="goNext()" '+(s.p===totalP-1?"disabled":"")+">"+(isCN?"下一页":"Next")+" →</button>";
  h+="</div>";
  document.getElementById("con").innerHTML=h;
}
render();
</script>
