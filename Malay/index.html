<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Latihan BM K2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f9f8f6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px;color:#1a1a1a}
#app{max-width:720px;margin:0 auto;background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h1{font-size:18px;font-weight:600;margin-bottom:4px;color:#1a1a1a}
.subtitle{font-size:13px;color:#888;margin-bottom:18px}
.ubar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #eee}
.ubtn{padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#555;font-family:inherit}
.ubtn:hover{background:#f5f5f5}
.ubtn.on{background:#dbeafe;color:#1d4ed8;border-color:transparent;font-weight:600}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ulbl{font-size:11px;color:#aaa;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.stag{background:#fef3c7;color:#92400e;font-size:12px;padding:3px 10px;border-radius:8px;font-weight:600}
.ph{margin-bottom:14px}
.ph-t{font-size:18px;font-weight:600;color:#111;margin-bottom:3px}
.ph-s{font-size:13px;color:#888}
.passage{background:#f5f5f3;border-radius:10px;padding:13px 16px;margin-bottom:13px;font-size:15px;line-height:1.75;color:#222}
.qcard{background:#fff;border:1px solid #eee;border-radius:14px;padding:15px 18px;margin-bottom:10px}
.qi{font-size:38px;display:block;margin-bottom:7px;line-height:1.2}
.qt{font-size:15px;font-weight:600;color:#111;margin-bottom:10px}
.opts{display:flex;gap:8px;flex-wrap:wrap}
.opt{padding:9px 16px;border:1px solid #ddd;border-radius:9px;background:#fff;cursor:pointer;font-size:14px;color:#333;font-family:inherit;transition:background .15s}
.opt:not(:disabled):hover{background:#f0f0f0}
.opt.good{background:#dcfce7;color:#15803d;border-color:transparent;font-weight:600}
.opt.bad{background:#fee2e2;color:#b91c1c;border-color:transparent}
.fb{font-size:13px;margin-top:9px;font-weight:600}
.fb.ok{color:#15803d}.fb.no{color:#b91c1c}
.wa{margin-top:11px}
.wa-lbl{font-size:12px;color:#888;margin-bottom:5px}
.wa-in{width:100%;border:1px solid #ddd;border-radius:9px;padding:9px 13px;font-size:15px;background:#fafafa;color:#111;font-family:inherit;outline:none}
.wa-in:focus{border-color:#93c5fd;background:#fff}
.pnav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid #eee}
.nbtn{padding:8px 20px;border:1px solid #ddd;border-radius:9px;background:#fff;cursor:pointer;font-size:13px;color:#333;font-family:inherit}
.nbtn:hover:not(:disabled){background:#f5f5f5}
.nbtn:disabled{opacity:.3;cursor:default}
.pdots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#ddd}
.dot.on{background:#555}
</style>
</head>

var s={u:0,p:0};
var A={};
var L=["A","B","C","D"];

function key(u,p,q){return u+"-"+p+"-"+q;}
function getScore(){var c=0;Object.keys(A).forEach(function(k){if(A[k]&&A[k].ok)c++;});return c;}
function goUnit(i){s.u=i;s.p=0;render();}
function goNext(){var pg=W[s.u].pages;if(s.p<pg.length-1){s.p++;render();}}
function goPrev(){if(s.p>0){s.p--;render();}}
function choose(qi,oi){
  var k=key(s.u,s.p,qi);
  if(A[k])return;
  var q=W[s.u].pages[s.p].qs[qi];
  A[k]={chosen:oi,ok:oi===q.ans};
  render();
}
function render(){
  var unit=W[s.u];
  var page=unit.pages[s.p];
  var totalP=unit.pages.length;
  document.getElementById("ubar").innerHTML=W.map(function(u,i){
    return '<button class="ubtn'+(i===s.u?" on":"")+'" onclick="goUnit('+i+')">'+u.em+" "+u.lbl+"</button>";
  }).join("");
  var h="";
  h+='<div class="topbar"><span class="ulbl">'+unit.title+" &middot; Halaman "+(s.p+1)+" / "+totalP+'</span><span class="stag">&#11088; '+getScore()+" betul</span></div>";
  h+='<div class="ph"><p class="ph-t">'+page.title+'</p><p class="ph-s">'+page.sub+"</p></div>";
  if(page.passage){
    var ptext=page.passage.replace(/\n/g,"<br>");
    h+='<div class="passage">'+(page.type==="read"?"&#128214; ":"")+ptext+"</div>";
  }
  for(var qi=0;qi<page.qs.length;qi++){
    var q=page.qs[qi];
    var k=key(s.u,s.p,qi);
    var a=A[k];
    h+='<div class="qcard">';
    if(q.img)h+='<span class="qi">'+q.img+"</span>";
    h+='<p class="qt">'+(qi+1)+". "+q.q+"</p><div class=\"opts\">";
    for(var oi=0;oi<q.opts.length;oi++){
      var cls="opt";
      if(a){if(oi===q.ans)cls+=" good";else if(oi===a.chosen&&oi!==q.ans)cls+=" bad";}
      h+='<button class="'+cls+'" onclick="choose('+qi+','+oi+')" '+(a?"disabled":"")+">"+L[oi]+". "+q.opts[oi]+"</button>";
    }
    h+="</div>";
    if(a){
      var correct=q.opts[q.ans];
      var msg=a.ok?("&#9989; Betul! Jawapan: <strong>"+correct+"</strong>"):("&#10060; Jawapan yang betul: <strong>"+correct+"</strong>");
      h+='<p class="fb '+(a.ok?"ok":"no")+'">'+msg+'</p><div class="wa"><p class="wa-lbl">&#9998; '+q.wp+'</p><input class="wa-in" type="text" placeholder="'+correct+'..."></div>';
    }
    h+="</div>";
  }
  var dots="";
  for(var i=0;i<totalP;i++)dots+='<div class="dot'+(i===s.p?" on":"")+'"></div>';
  h+='<div class="pnav"><button class="nbtn" onclick="goPrev()" '+(s.p===0?"disabled":"")+">&#8592; Sebelum</button><div class=\"pdots\">"+dots+'</div><button class="nbtn" onclick="goNext()" '+(s.p===totalP-1?"disabled":"")+">Seterusnya &#8594;</button></div>";
  document.getElementById("con").innerHTML=h;
}
render();
</script>
