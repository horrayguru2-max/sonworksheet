var s={u:0,p:0};
var A={};
var L=["A","B","C","D"];

function key(u,p,q){return u+"-"+p+"-"+q;}
function getScore(){var c=0;Object.keys(A).forEach(function(k){if(A[k]&&A[k].ok)c++;});return c;}
function goUnit(i){s.u=i;s.p=0;render();}
function goNext(){var pg=W[s.u].pages;if(s.p<pg.length-1){s.p++;render();}}
function goPrev(){if(s.p>0){s.p--;render();}}

function choose(qi,oi){
  var k=key(s.u,s.p,qi);
  if(A[k])return;
  var q=W[s.u].pages[s.p].qs[qi];
  A[k]={chosen:oi,ok:oi===q.ans};
  render();
}

function render(){
  var unit=W[s.u];
  var page=unit.pages[s.p];
  var totalP=unit.pages.length;

  var ubar=document.getElementById("ubar");
  ubar.innerHTML=W.map(function(u,i){
    return '<button class="ubtn'+(i===s.u?" on":"")+'" onclick="goUnit('+i+')">'+u.em+" "+u.lbl+"</button>";
  }).join("");

  var h="";
  h+='<div class="topbar">';
  h+='<span class="ulbl">'+unit.title+" &middot; Halaman "+(s.p+1)+" / "+totalP+"</span>";
  h+='<span class="stag">&#11088; '+getScore()+" betul</span>";
  h+="</div>";

  h+='<div class="ph"><p class="ph-t">'+page.title+"</p><p class=\"ph-s\">"+page.sub+"</p></div>";

  if(page.passage){
    var ptext=page.passage.replace(/\n/g,"<br>");
    var prefix=(page.type==="read")?"&#128214; ":"";
    h+='<div class="passage">'+prefix+ptext+"</div>";
  }

  for(var qi=0;qi<page.qs.length;qi++){
    var q=page.qs[qi];
    var k=key(s.u,s.p,qi);
    var a=A[k];
    h+='<div class="qcard">';
    if(q.img)h+='<span class="qi">'+q.img+"</span>";
    h+='<p class="qt">'+(qi+1)+". "+q.q+"</p>";
    h+='<div class="opts">';
    for(var oi=0;oi<q.opts.length;oi++){
      var cls="opt";
      if(a){
        if(oi===q.ans)cls+=" good";
        else if(oi===a.chosen&&oi!==q.ans)cls+=" bad";
      }
      h+='<button class="'+cls+'" onclick="choose('+qi+','+oi+')" '+(a?"disabled":"")+">"+L[oi]+". "+q.opts[oi]+"</button>";
    }
    h+="</div>";
    if(a){
      var correct=q.opts[q.ans];
      var msg=a.ok
        ?("&#9989; Betul! Jawapan: <strong>"+correct+"</strong>")
        :("&#10060; Jawapan yang betul: <strong>"+correct+"</strong>");
      h+='<p class="fb '+(a.ok?"ok":"no")+'">'+msg+"</p>";
      h+='<div class="wa"><p class="wa-lbl">&#9998; '+q.wp+"</p>";
      h+='<input class="wa-in" type="text" placeholder="'+correct+'..."></div>';
    }
    h+="</div>";
  }

  var dots="";
  for(var i=0;i<totalP;i++){dots+='<div class="dot'+(i===s.p?" on":"")+'" ></div>';}

  h+='<div class="pnav">';
  h+='<button class="nbtn" onclick="goPrev()" '+(s.p===0?"disabled":"")+">&#8592; Sebelum</button>";
  h+='<div class="pdots">'+dots+"</div>";
  h+='<button class="nbtn" onclick="goNext()" '+(s.p===totalP-1?"disabled":"")+">Seterusnya &#8594;</button>";
  h+="</div>";

  document.getElementById("con").innerHTML=h;
}

render();
</script>
